name: Auto-merge sprint PRs

# Merges open PRs from sprint/* branches when CI succeeds.
on:
  check_suite:
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.event.check_suite.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Merge sprint PR after green CI
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pullRequests = context.payload.check_suite.pull_requests || [];

            for (const item of pullRequests) {
              const { data: pr } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: item.number,
              });

              if (pr.state !== 'open' || !pr.head.ref.startsWith('sprint/')) {
                continue;
              }

              if (!pr.mergeable) {
                core.info(`PR #${pr.number} not mergeable yet`);
                continue;
              }

              await github.rest.pulls.merge({
                owner,
                repo,
                pull_number: pr.number,
                merge_method: 'merge',
              });

              core.info(`Merged sprint PR #${pr.number} (${pr.head.ref})`);
            }
