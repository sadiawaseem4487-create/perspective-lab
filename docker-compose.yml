services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sao-paulo-dropout-agents
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      ENVIRONMENT: production
      DATABASE_PATH: /app/backend/data/sessions.db
      FRONTEND_DIST: /app/frontend/dist
    volumes:
      - app-data:/app/backend/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s

volumes:
  app-data:
    driver: local
